name: 'Socle Run'
description: 'Trigger Terraform/OpenTofu runs via the Socle API'
author: 'Socle Labs'

inputs:
  api-key:
    description: 'Socle API key'
    required: true
  server-url:
    description: 'Socle server URL'
    required: true
    default: 'https://api.socle.cloud'
  workspace-id:
    description: 'Workspace ID to run against'
    required: true
  command:
    description: 'Run type: plan, apply, or destroy'
    required: true
    default: 'plan'
  wait:
    description: 'Wait for the run to complete'
    required: false
    default: 'true'

outputs:
  run-id:
    description: 'The ID of the created run'
  status:
    description: 'Final status of the run'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'layers'
  color: 'green'
